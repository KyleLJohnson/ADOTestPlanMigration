name: Run .NET Tests

on:
  push:
    branches: [ main ]

jobs:
  test:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          
      - name: Azure CLI Login (Service Principal)
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
          allow-no-subscriptions: true

      - name: Validate Azure CLI token for Azure DevOps
        shell: pwsh
        run: |
          az account list --all --output table | Out-String
          $token = az account get-access-token --resource 499b84ac-1321-427f-aa17-267ca6975798 --query accessToken -o tsv
          if ([string]::IsNullOrWhiteSpace($token)) {
            throw "Failed to acquire Azure DevOps access token after login."

      - name: Restore
        run: dotnet restore ./src/SampleTests/

      - name: Build
        run: dotnet build ./src/SampleTests/ --no-restore

      - name: Run Tests
        run: dotnet test ./src/SampleTests/ --logger trx --results-directory ./data/test-results

      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: ./data/test-results
      - name: Publish Test Results Back to ADO
        shell: pwsh
        env:
          ADO_ORG: ${{ secrets.ADO_ORG }}
          ADO_PROJECT: ${{ secrets.ADO_PROJECT }}
          ADO_PAT: ${{ secrets.ADO_PAT }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SHA: ${{ github.sha }}
        run: |
          ./scripts/publish-test-results.ps1 `
            -TrxPath "./data/test-results/results.trx" `
            -MappingPath "./mapping/testcase-mapping.json" `
            -RunName "GitHub POC - Login Tests"
